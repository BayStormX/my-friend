<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Progress Diary 🤍</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Mali:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="soft-bg"></div>

    <header>
        <div class="header-content">
            <h1>Dear my Kindest Soul</h1>
            <p>บันทึกทุกความคืบหน้า... ของเราสองคน 🌿</p>
            <div class="btn-group">
                <button class="btn-add-memory" onclick="openModal()">+ บันทึกเรื่องราววันนี้</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="memory-feed" class="memory-feed"></div>
    </main>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>✍️ วันนี้เป็นยังไงบ้าง?</h2>
            
            <div class="input-group">
                <label>📅 วันที่และเวลา:</label>
                <input type="datetime-local" id="memory-datetime">
            </div>

            <div class="input-group">
                <label>🖼️ รูปภาพหรือวิดีโอ (ถ้ามี):</label>
                <input type="file" id="media-input" accept="image/*,video/*">
                <small>*สามารถข้ามได้ถ้าต้องการบันทึกแค่ข้อความ*</small>
            </div>

            <div class="input-group">
                <label>✨ ความคืบหน้า / หัวข้อวันนี้:</label>
                <input type="text" id="memory-reason" placeholder="เช่น วันนี้คุยกันนานขึ้น, เขาบอกฝันดีด้วย...">
            </div>

            <div class="input-group">
                <label>📝 รายละเอียดเหตุการณ์ / ความรู้สึก:</label>
                <textarea id="memory-story" placeholder="วันนี้มีอะไรคืบหน้าบ้าง? เขาน่ารักยังไง..."></textarea>
            </div>

            <button class="btn-save" onclick="saveNewMemory()">บันทึกความทรงจำ ✨</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
